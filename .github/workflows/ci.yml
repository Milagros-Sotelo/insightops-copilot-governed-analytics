name: CI
on:
  push:
    branches: [main]
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e .[dev]
      - run: python -m insightops.pipeline --output data/demo
      - run: pytest
      - run: python -m insightops.evaluation --data-dir data/demo/marts --output reports/copilot_evaluation.json

